name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Python 3.11 checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --locked --dev

      - name: Generate native test fixture
        shell: bash
        run: |
          fixture_generator="$(
            find build-v13 -type f -name pyrealm_fixture_generator -print -quit
          )"
          mkdir -p "${RUNNER_TEMP}/pyrealm-fixtures"
          "${fixture_generator}" \
            "${RUNNER_TEMP}/pyrealm-fixtures/encrypted.realm" \
            "${RUNNER_TEMP}/pyrealm-fixtures/encrypted.key"

      - name: Lint
        run: uv run --locked ruff check .

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Type check
        run: uv run --locked ty check src tests

      - name: Test
        env:
          PYREALM_TEST_FIXTURES: ${{ runner.temp }}/pyrealm-fixtures
        run: uv run --locked pytest

      - name: Minimize cache
        if: always()
        run: uv cache prune --ci
