name: Wheels

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  wheels:
    name: ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            os: ubuntu-latest
            arch: x86_64
          - platform: macOS
            os: macos-14
            arch: arm64
          - platform: Windows
            os: windows-latest
            arch: AMD64

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build and test wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: distributions-${{ matrix.platform }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Build source distribution
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: distributions-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7
