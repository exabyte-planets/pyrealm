name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Require a version tag matching pyproject.toml
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Releases must run from a tag." >&2
            exit 1
          fi

          project_version="$(
            python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])'
          )"
          if [[ "${GITHUB_REF_NAME}" != "v${project_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version v${project_version}." >&2
            exit 1
          fi

  build:
    name: Build distributions
    needs: validate
    uses: ./.github/workflows/wheels.yml

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyrealm-forensics
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: distributions-*
          path: dist
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
